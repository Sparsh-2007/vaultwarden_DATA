version: '3.8'

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden_local
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - SIGNUPS_ALLOWED=true
      - INVITATIONS_ALLOWED=true
      - WEBSOCKET_ENABLED=true
    volumes:
      - "C:\\Users\\hp\\Desktop\\SelfHost\\vaultwarden-system:/data"
    networks:
      - proxy-network

  caddy:
    image: caddy:2-alpine
    container_name: local_https_proxy
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./localhost.pem:/certs/localhost.pem:ro
      - ./localhost-key.pem:/certs/localhost-key.pem:ro
    networks:
      - proxy-network
    restart: unless-stopped

networks:
  proxy-network:
    driver: bridge